name: Sync to Hugging Face Hub

# This tells GitHub to run the sync every time you push to the 'main' branch
on:
  push:
    branches: [main]
  # This allows you to also trigger the sync manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # This command forces the GitHub repo to overwrite the Hugging Face repo
          git push --force https://sukriramli:$HF_TOKEN@huggingface.co/spaces/sukriramli/MUHAMMAD_SUKRI_RAMLI main
