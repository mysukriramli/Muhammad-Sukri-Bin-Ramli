name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Set up git credentials for the action
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # Tell Git to use LFS for your PDFs and Images
          git lfs install
          git lfs track "*.pdf"
          git lfs track "*.jpg"
          git add .gitattributes
          git commit -m "Track binary files with Git LFS" || echo "No changes to commit"
          
          # Migrate the existing files into the LFS format required by Hugging Face
          git lfs migrate import --include="*.pdf,*.jpg" --everything --yes
          
          # Force push the LFS-formatted repository to Hugging Face
          git push --force https://sukriramli:$HF_TOKEN@huggingface.co/spaces/sukriramli/MUHAMMAD_SUKRI_RAMLI main
